<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEY SCANNER v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1320; /* 深藍色背景 */
            color: #e2e8f0;
            background-image: 
                linear-gradient(rgba(25, 40, 65, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(25, 40, 65, 0.5) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .tech-font {
            font-family: 'Share Tech Mono', monospace;
        }
        
        .neon-border {
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.1), inset 0 0 10px rgba(56, 189, 248, 0.05);
        }
        
        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #1e3a5f;
            color: #4b5563;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .step-circle.active {
            border-color: #38bdf8;
            color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            text-shadow: 0 0 5px rgba(56, 189, 248, 0.8);
        }

        .step-circle.completed {
             border-color: #10b981;
             color: #10b981;
        }
        
        .step-line {
            flex-grow: 1;
            height: 2px;
            background-color: #1e3a5f;
            margin: 0 10px;
            transition: all 0.3s ease;
        }
        
        .step-line.active {
            background-color: #38bdf8;
            box-shadow: 0 0 5px rgba(56, 189, 248, 0.4);
        }

        .step-line.completed {
            background-color: #10b981;
        }
        
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #38bdf8;
            box-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8;
            animation: scan 2s linear infinite;
            display: none;
            z-index: 10;
        }

        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 120px;
            border: 2px dashed rgba(56, 189, 248, 0.8);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            pointer-events: none; /* 讓點擊穿透 */
            z-index: 5;
            display: none;
        }

        /* 瞄準框的四個角 */
        .target-box::before, .target-box::after,
        .target-corner-bottom::before, .target-corner-bottom::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #38bdf8;
            border-style: solid;
        }
        
        .target-box::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
        .target-box::after { top: -2px; right: -2px; border-width: 3px 3px 0 0; }
        
        .target-corner-bottom { position: absolute; bottom: 0; left: 0; right: 0; top: 0;}
        .target-corner-bottom::before { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; }
        .target-corner-bottom::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }
        
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        #videoElement {
            width: 100%;
            height: auto;
            border-radius: 0.5rem;
            object-fit: cover;
        }
        
        #qrcode img {
            margin: 0 auto;
            border: 10px solid white;
            border-radius: 8px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-8">

    <div class="w-full max-w-md space-y-6">
        
        <!-- Header -->
        <div class="flex items-center justify-center gap-4 mb-8 pt-4">
            <div class="bg-blue-500 p-2 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 8a6 6 0 01-7.743 5.743L10 14l-1 1-1 1H6v2H2v-4l4.257-4.257A6 6 0 1118 8zm-6-4a1 1 0 100 2 2 2 0 012 2 1 1 0 102 0 4 4 0 00-4-4z" clip-rule="evenodd" />
                </svg>
            </div>
            <div>
                <h1 class="text-3xl font-black tracking-widest text-white">KEY SCANNER <span class="text-sm font-normal text-teal-400 border border-teal-800 bg-teal-900/30 px-2 py-1 rounded">v3.1</span></h1>
                <p class="text-xs text-center text-gray-400 tracking-[0.3em] mt-1">WINDOWS 序號辨識系統</p>
            </div>
        </div>

        <!-- 步驟指示器 -->
        <div class="flex items-center justify-between px-4 mb-6">
            <div class="flex flex-col items-center gap-2">
                <div id="step1-circle" class="step-circle active tech-font">01</div>
                <span class="text-xs text-blue-400">拍照</span>
            </div>
            <div id="step1-line" class="step-line"></div>
            
            <div class="flex flex-col items-center gap-2">
                <div id="step2-circle" class="step-circle tech-font">02</div>
                <span class="text-xs text-gray-500" id="step2-text">辨識</span>
            </div>
            <div id="step2-line" class="step-line"></div>
            
            <div class="flex flex-col items-center gap-2">
                <div id="step3-circle" class="step-circle tech-font">03</div>
                <span class="text-xs text-gray-500" id="step3-text">QR碼</span>
            </div>
        </div>

        <!-- 主要工作區 -->
        <div class="bg-[#111c2f] rounded-2xl p-6 neon-border relative overflow-hidden">
            
            <div class="flex items-center justify-between mb-4 border-b border-gray-700 pb-2">
                <h2 id="step-title" class="text-sm text-blue-400 font-bold tracking-widest">步驟 01 - 拍攝貼紙</h2>
            </div>

            <!-- 步驟 1: 鏡頭與拍照 -->
            <div id="camera-section" class="relative rounded-lg overflow-hidden bg-black aspect-[4/3] flex items-center justify-center">
                <video id="videoElement" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                <div id="camera-placeholder" class="text-gray-500 text-sm flex flex-col items-center">
                    <svg class="h-12 w-12 mb-2 opacity-50" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span>點擊下方按鈕啟動相機</span>
                </div>
                
                <!-- 掃描特效與對齊框 -->
                <div id="scan-line" class="scan-line"></div>
                <div id="target-box" class="target-box">
                    <div class="target-corner-bottom"></div>
                    <p class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-blue-400 w-full text-center tracking-wider">請將序號對準框內</p>
                </div>
            </div>

            <!-- 畫布 (用於擷取畫面，隱藏) -->
            <canvas id="canvasElement" class="hidden"></canvas>

            <!-- 步驟 2: 處理狀態 -->
            <div id="processing-section" class="hidden py-8 flex flex-col items-center justify-center gap-4">
                <div class="relative w-16 h-16">
                    <svg class="animate-spin text-blue-500 w-full h-full" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center text-xs font-bold text-blue-400" id="progress-percent">0%</div>
                </div>
                <div id="status-text" class="text-sm text-gray-300 tracking-wider">正在分析影像...</div>
                
                <div class="w-full bg-gray-800 rounded-full h-1.5 mt-2">
                    <div id="progress-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <!-- 步驟 3: 結果與 QRCode -->
            <div id="result-section" class="hidden flex flex-col items-center py-4">
                <div class="bg-white p-4 rounded-xl shadow-[0_0_20px_rgba(255,255,255,0.2)] mb-6">
                    <div id="qrcode"></div>
                </div>
                
                <div class="text-center w-full">
                    <h3 class="text-xs text-gray-400 tracking-widest mb-1">掃描結果</h3>
                    <div id="result-text" class="text-2xl font-bold text-green-400 tech-font tracking-widest border border-green-900/50 bg-green-900/20 py-2 rounded-lg break-all"></div>
                </div>
            </div>

            <!-- 錯誤提示 -->
            <div id="error-message" class="hidden mt-4 p-3 bg-red-900/40 border border-red-500/50 rounded-lg text-red-300 text-sm text-center"></div>

            <!-- 控制按鈕區 -->
            <div class="mt-6 flex flex-col gap-3">
                <button id="startCameraBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-4 rounded-xl transition-all shadow-[0_0_15px_rgba(59,130,246,0.5)] active:scale-[0.98] flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    啟動相機
                </button>
                
                <button id="captureBtn" class="hidden w-full bg-gradient-to-r from-teal-500 to-teal-400 hover:from-teal-400 hover:to-teal-300 text-white font-bold py-4 rounded-xl transition-all shadow-[0_0_15px_rgba(20,184,166,0.5)] active:scale-[0.98] flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    拍照辨識
                </button>

                <button id="retryBtn" class="hidden w-full border border-gray-600 text-gray-300 hover:bg-gray-800 font-bold py-3 rounded-xl transition-colors active:scale-[0.98]">
                    重新掃描
                </button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const ctx = canvas.getContext('2d');
        
        // 區塊
        const cameraSection = document.getElementById('camera-section');
        const processingSection = document.getElementById('processing-section');
        const resultSection = document.getElementById('result-section');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        
        // UI 元素
        const scanLine = document.getElementById('scan-line');
        const targetBox = document.getElementById('target-box');
        const stepTitle = document.getElementById('step-title');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const errorMessage = document.getElementById('error-message');
        const resultText = document.getElementById('result-text');
        const qrcodeContainer = document.getElementById('qrcode');
        
        // 按鈕
        const startCameraBtn = document.getElementById('startCameraBtn');
        const captureBtn = document.getElementById('captureBtn');
        const retryBtn = document.getElementById('retryBtn');

        let stream = null;
        let qrcodeInstance = null;
        // 放寬正規表達式，允許中間有空格或相似字元，並在之後過濾
        const serialNumberRegex = /RSA1A[- ]?[A-Za-z0-9]{6}/i;

        async function startCamera() {
            try {
                // 請求後置鏡頭，並設定解析度以提高辨識率
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    } 
                });
                
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.classList.remove('hidden');
                    cameraPlaceholder.classList.add('hidden');
                    targetBox.style.display = 'block';
                    
                    // 切換按鈕
                    startCameraBtn.classList.add('hidden');
                    captureBtn.classList.remove('hidden');
                    errorMessage.classList.add('hidden');
                };
            } catch (err) {
                console.error("相機啟動失敗:", err);
                showError("無法存取相機，請確認已給予權限。");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.classList.add('hidden');
                cameraPlaceholder.classList.remove('hidden');
                targetBox.style.display = 'none';
                startCameraBtn.classList.remove('hidden');
                captureBtn.classList.add('hidden');
            }
        }

        startCameraBtn.addEventListener('click', startCamera);

        captureBtn.addEventListener('click', () => {
            // 擷取當前影片畫面到 canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // 計算擷取框的位置和大小 (對應畫面上的 target-box)
            // 假設 target-box 寬度為 80%，高度為 120px，置中
            const boxWidth = video.videoWidth * 0.8;
            const boxHeight = 150; // 稍微放大擷取範圍，原本 CSS 是 120px
            const startX = (video.videoWidth - boxWidth) / 2;
            const startY = (video.videoHeight - boxHeight) / 2;

            // 只將目標區域畫到 canvas 上
            ctx.drawImage(video, startX, startY, boxWidth, boxHeight, 0, 0, canvas.width, canvas.height);
            
            // 進行影像前處理 (灰階與對比增強) 以對抗螢幕摩爾紋
            preprocessImage(canvas);

            const imageDataUrl = canvas.toDataURL('image/jpeg', 1.0); // 使用最高品質
            
            // 停止相機並進入處理模式
            stopCamera();
            startProcessing(imageDataUrl);
        });

        // 影像前處理：轉灰階並增強對比
        function preprocessImage(canvas) {
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // 找出最亮和最暗的點來做對比拉伸 (Contrast Stretching)
            let min = 255;
            let max = 0;

            for (let i = 0; i < data.length; i += 4) {
                // 轉灰階 (Luminosity formula)
                const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                data[i] = data[i + 1] = data[i + 2] = gray;
                
                if (gray < min) min = gray;
                if (gray > max) max = gray;
            }

            // 增強對比並二值化 (Thresholding)
            const threshold = (min + max) / 2; // 可以根據情況調整閾值
            for (let i = 0; i < data.length; i += 4) {
                // 正規化對比度
                let normalized = ((data[i] - min) / (max - min)) * 255;
                
                // 輕微的二值化處理，讓文字更銳利
                if(normalized < threshold * 0.8) {
                    normalized = 0; // 變黑
                } else if (normalized > threshold * 1.2) {
                    normalized = 255; // 變白
                }
                
                data[i] = data[i + 1] = data[i + 2] = normalized;
            }
            
            ctx.putImageData(imageData, 0, 0);
        }

        retryBtn.addEventListener('click', () => {
            resetUI();
            startCamera();
        });

        function updateSteps(step) {
            // 重置所有步驟
            for(let i=1; i<=3; i++) {
                document.getElementById(`step${i}-circle`).className = 'step-circle tech-font';
                if(i<3) document.getElementById(`step${i}-line`).className = 'step-line';
            }
            
            // 根據進度上色
            if (step >= 1) {
                document.getElementById('step1-circle').classList.add(step > 1 ? 'completed' : 'active');
                if(step > 1) {
                    document.getElementById('step1-line').classList.add('completed');
                    document.getElementById('step2-text').classList.replace('text-gray-500', 'text-blue-400');
                }
            }
            if (step >= 2) {
                document.getElementById('step2-circle').classList.add(step > 2 ? 'completed' : 'active');
                if(step > 2) {
                    document.getElementById('step2-line').classList.add('completed');
                    document.getElementById('step3-text').classList.replace('text-gray-500', 'text-blue-400');
                }
            }
            if (step >= 3) {
                document.getElementById('step3-circle').classList.add('active');
            }
        }

        async function startProcessing(imageDataUrl) {
            // 切換 UI 到辨識中狀態
            updateSteps(2);
            stepTitle.innerText = "步驟 02 - 影像分析中";
            cameraSection.classList.add('hidden');
            processingSection.classList.remove('hidden');
            retryBtn.classList.add('hidden');
            errorMessage.classList.add('hidden');
            
            progressBar.style.width = '0%';
            progressPercent.innerText = '0%';

            try {
                const worker = await Tesseract.createWorker({
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            const progress = Math.round(m.progress * 100);
                            progressBar.style.width = `${progress}%`;
                            progressPercent.innerText = `${progress}%`;
                            statusText.innerText = '正在擷取序號特徵...';
                        } else {
                            statusText.innerText = '載入辨識引擎...';
                        }
                    }
                });
                
                await worker.loadLanguage('eng');
                await worker.initialize('eng');
                
                // 為了提高特定序號的辨識率，可以設定白名單
                await worker.setParameters({
                    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789- ', // 加入空格
                    tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK, // 假設是一個文字塊，有助於表格內文字
                });

                const { data: { text } } = await worker.recognize(imageDataUrl);
                await worker.terminate();
                
                processResult(text);

            } catch (error) {
                console.error('OCR Error:', error);
                showError('辨識引擎發生錯誤，請重試。');
                resetUI();
                startCameraBtn.classList.remove('hidden');
            }
        }

        function processResult(text) {
            console.log("Raw OCR Text:", text);
            
            // 清理 OCR 常見的誤判，例如將 O 看成 0，或移除非必要的空格
            let cleanedText = text.replace(/0SA1A/g, 'RSA1A') // 修正常見的 R 辨識錯誤
                                  .replace(/R5A1A/g, 'RSA1A');

            const match = cleanedText.match(serialNumberRegex);
            
            if (match) {
                // 清理找到的字串：轉大寫、移除所有空格，確保中間有連字號
                let serialNumber = match[0].toUpperCase().replace(/\s/g, '');
                
                // 如果正則表達式匹配到了少了 dash 的版本，把它補回來
                if (!serialNumber.includes('-')) {
                    serialNumber = serialNumber.replace('RSA1A', 'RSA1A-');
                }

                // 最終檢查長度是否正確 (RSA1A- + 6碼 = 12碼)
                if (serialNumber.length === 12) {
                    showSuccess(serialNumber);
                } else {
                    showError('找到疑似序號，但長度不符，請重試。');
                    showRetryUI();
                }

            } else {
                showError('找不到符合格式的序號 (RSA1A-XXXXXX)');
                showRetryUI();
            }
        }

        function showRetryUI() {
            // 顯示重試按鈕，回到步驟1
            processingSection.classList.add('hidden');
            cameraSection.classList.remove('hidden');
            cameraPlaceholder.classList.add('hidden'); // 相機已啟動，不需要 placeholder
            captureBtn.classList.remove('hidden');
            startCameraBtn.classList.add('hidden');
            updateSteps(1);
            // 重新啟動相機串流
            if(!stream || !stream.active) {
                startCamera();
            } else {
                 video.classList.remove('hidden');
                 targetBox.style.display = 'block';
            }
        }

        function showSuccess(serialNumber) {
            updateSteps(3);
            stepTitle.innerText = "步驟 03 - 掃描結果";
            processingSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
            
            // 隱藏啟動相機與拍照按鈕，只顯示重新掃描
            startCameraBtn.classList.add('hidden');
            captureBtn.classList.add('hidden');
            retryBtn.classList.remove('hidden');
            
            resultText.innerText = serialNumber;
            
            // 產生 QR Code
            qrcodeContainer.innerHTML = ''; // 清空之前的
            qrcodeInstance = new QRCode(qrcodeContainer, {
                text: serialNumber,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function showError(msg) {
            errorMessage.innerText = msg;
            errorMessage.classList.remove('hidden');
        }

        function resetUI() {
            updateSteps(1);
            stepTitle.innerText = "步驟 01 - 拍攝貼紙";
            
            cameraSection.classList.remove('hidden');
            processingSection.classList.add('hidden');
            resultSection.classList.add('hidden');
            errorMessage.classList.add('hidden');
            
            startCameraBtn.classList.remove('hidden');
            captureBtn.classList.add('hidden');
            retryBtn.classList.add('hidden');
            
            document.getElementById('step2-text').classList.replace('text-blue-400', 'text-gray-500');
            document.getElementById('step3-text').classList.replace('text-blue-400', 'text-gray-500');
        }
    </script>
